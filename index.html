  <style>
    :root {
      --bg: #fffbf0;
      --bg2: #fff8e1;
      --card: rgba(255,255,255,0.82);
      --border: rgba(234,179,8,0.18);
      --teal: #d97706;
      --coral: #f59e0b;
      --gold: #fbbf24;
      --text: #292200;
      --muted: #92784a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1,h2,h3 { font-family: 'Syne', sans-serif; }

    /* Starfield */
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .star {
      position: absolute; background: #fde68a; border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.2); }
    }

    /* Glow orbs */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0; opacity: 0.15;
    }

    /* Glass card */
    .glass {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(234,179,8,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #fde68a; border-radius: 3px; }

    /* Nav */
    .nav-link {
      position: relative; padding: 6px 4px; font-weight: 500;
      color: var(--muted); transition: color 0.2s; cursor: pointer;
    }
    .nav-link::after {
      content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
      height: 2px; background: var(--teal); transform: scaleX(0);
      transition: transform 0.2s; border-radius: 2px;
    }
    .nav-link.active { color: var(--teal); }
    .nav-link.active::after { transform: scaleX(1); }
    .nav-link:hover { color: var(--text); }

    /* Post card */
    .post-card {
      transition: transform 0.2s, box-shadow 0.2s;
      border-radius: 16px;
      animation: fadeUp 0.4s ease both;
    }
    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(217,119,6,0.13);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Reaction btn */
    .react-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.03); cursor: pointer;
      transition: all 0.18s; font-size: 13px; font-weight: 500;
      color: var(--muted);
    }
    .react-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .react-btn.active-like { background: rgba(99,179,237,0.15); border-color: #63b3ed; color: #63b3ed; }
    .react-btn.active-haha { background: rgba(255,209,102,0.15); border-color: var(--gold); color: var(--gold); }
    .react-btn.active-heart { background: rgba(255,107,107,0.15); border-color: var(--coral); color: var(--coral); }

    /* Input */
    .inp {
      width: 100%; background: rgba(255,255,255,0.9);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 15px; outline: none; transition: border-color 0.2s;
    }
    .inp:focus { border-color: var(--teal); }
    .inp::placeholder { color: var(--muted); }
    textarea.inp { resize: vertical; min-height: 120px; line-height: 1.6; }

    /* Primary btn */
    .btn-primary {
      background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
      color: white; font-weight: 700; padding: 11px 24px;
      border-radius: 10px; border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s; font-family: 'Syne', sans-serif;
      font-size: 15px; letter-spacing: 0.02em;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* Modal overlay */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(255,251,240,0.88);
      backdrop-filter: blur(8px); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }

    /* City badge */
    .city-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(217,119,6,0.08); border: 1px solid rgba(217,119,6,0.2);
      color: var(--teal); padding: 3px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 500;
    }

    /* View badge */
    .view-badge {
      display: inline-flex; align-items: center; gap: 4px;
      color: var(--muted); font-size: 12px;
    }

    /* Admin badge */
    .admin-badge {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: white; padding: 2px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    }

    /* Hero gradient text */
    .grad-text {
      background: linear-gradient(135deg, #d97706 0%, #f59e0b 50%, #fbbf24 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Comment */
    .comment-item {
      padding: 10px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      animation: fadeUp 0.3s ease both;
    }

    /* Pulse dot */
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.6} }
    .pulse-dot { animation: pulse 2s infinite; }

    /* Loader */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: white; border: 1px solid var(--teal);
      color: var(--teal); padding: 12px 20px; border-radius: 12px;
      font-weight: 600; font-size: 14px;
      animation: slideIn 0.3s ease, slideOut 0.3s ease 2.5s both;
      box-shadow: 0 4px 20px rgba(217,119,6,0.15);
    }
    @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes slideOut { from{transform:translateX(0);opacity:1} to{transform:translateX(100%);opacity:0} }

    .tag-chip {
      display: inline-block; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); padding: 3px 12px;
      border-radius: 999px; font-size: 12px; color: var(--muted);
      cursor: pointer; transition: all 0.2s;
    }
    .tag-chip:hover { background: rgba(217,119,6,0.08); border-color: rgba(217,119,6,0.3); color: var(--teal); }

    /* Admin panel */
    .admin-row { padding: 14px 16px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); }
    .admin-row + .admin-row { margin-top: 8px; }

    /* Number input */
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }

    /* Avatar picker */
    .avatar-grid { display: grid; grid-template-columns: repeat(10,1fr); gap: 7px; margin: 16px 0; }
    .avatar-option {
      width: 42px; height: 42px; border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; border: 2px solid transparent;
      transition: all 0.18s; background: rgba(255,255,255,0.6);
    }
    .avatar-option:hover { transform: scale(1.1); border-color: var(--teal); }
    .avatar-option.selected { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(217,119,6,0.2); transform: scale(1.1); }

    /* Logo animation */
    @keyframes dividerPulse {
      0%,100% { opacity:1; transform:scaleY(1); }
      50% { opacity:0.4; transform:scaleY(0.7); }
    }
    @keyframes bFlash {
      0%,100% { color:#d97706; }
      50% { color:#f59e0b; }
    }
    @keyframes hFlash {
      0%,100% { color:#292200; }
      50% { color:#d97706; }
    }
    .logo-b { animation: bFlash 1.4s ease-in-out infinite; font-family:'Syne',sans-serif; font-weight:900; font-size:17px; }
    .logo-h { animation: hFlash 1.4s ease-in-out infinite 0.7s; font-family:'Syne',sans-serif; font-weight:900; font-size:17px; }
    .logo-divider {
      width:2px; height:22px; background:#d97706; border-radius:2px;
      animation: dividerPulse 1.4s ease-in-out infinite;
    }

    /* Hover menu */
    .hover-menu {
      position: absolute; right: 0; top: 100%; margin-top: 6px;
      background: white; border: 1px solid var(--border);
      border-radius: 12px; padding: 6px; min-width: 160px;
      box-shadow: 0 8px 30px rgba(217,119,6,0.12); z-index: 50;
    }
    .hover-menu-item {
      padding: 8px 12px; border-radius: 8px; cursor: pointer;
      font-size: 13px; color: var(--muted); transition: all 0.15s;
      display: flex; align-items: center; gap: 8px;
    }
    .hover-menu-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .hover-menu-item.danger:hover { background: rgba(255,107,107,0.1); color: var(--coral); }

    /* ── Notification Bell ── */
    .notif-wrap { position:relative; }
    .notif-btn {
      background:none; border:none; cursor:pointer;
      width:36px; height:36px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.2s; font-size:19px; color:var(--muted);
    }
    .notif-btn:hover { background:rgba(217,119,6,0.09); color:var(--text); }
    .notif-badge {
      position:absolute; top:-3px; right:-3px;
      min-width:17px; height:17px;
      background:#ef4444; color:white; border-radius:9px;
      font-size:10px; font-weight:800;
      display:flex; align-items:center; justify-content:center;
      padding:0 3px; border:2px solid var(--bg);
      font-family:'DM Sans',sans-serif; pointer-events:none;
      animation: badgePop 0.3s cubic-bezier(0.175,0.885,0.32,1.6) both;
    }
    @keyframes badgePop { from{transform:scale(0)} to{transform:scale(1)} }

    /* ── Notification Panel ── */
    .notif-panel {
      position:absolute; right:0; top:calc(100% + 10px);
      width:310px; max-height:400px; overflow-y:auto;
      background:white; border:1px solid var(--border);
      border-radius:18px;
      box-shadow:0 12px 48px rgba(217,119,6,0.16);
      z-index:300; animation:fadeUp 0.2s ease;
    }
    .notif-row {
      padding:12px 16px; border-bottom:1px solid rgba(234,179,8,0.1);
      cursor:pointer; transition:background 0.15s;
      display:flex; gap:10px; align-items:flex-start;
    }
    .notif-row:hover { background:rgba(217,119,6,0.04); }
    .notif-row.unread { background:rgba(217,119,6,0.07); border-left:3px solid var(--teal); }
    .notif-row:last-child { border-bottom:none; }

    /* ── Permission Banner ── */
    @keyframes slideUpBanner { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
    .perm-banner {
      position:fixed; bottom:0; left:0; right:0; z-index:500;
      background:white; border-top:1.5px solid rgba(217,119,6,0.2);
      padding:14px 24px;
      display:flex; align-items:center; justify-content:space-between; gap:14px;
      box-shadow:0 -4px 28px rgba(217,119,6,0.12);
      animation:slideUpBanner 0.35s ease; flex-wrap:wrap;
    }
    /* Name color tag */
    .name-tag {
      display: inline-flex; align-items: center;
      padding: 2px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 800; color: white; letter-spacing: 0.03em;
    }
  </style>
</head>

  /* ══════════════════════════════════════════════════

  const BHT_NOTIF_ICON = "data:image/svg+xml," + encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
      <rect width="64" height="64" rx="16" fill="#d97706"/>

  function notifSupported() {
    return typeof window !== "undefined" && "Notification" in window;
  }
  function isIOSDevice() {
    return /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
  }
  function getNotifPerm() {
    if (!notifSupported()) return "unsupported";
    return Notification.permission; // "default" | "granted" | "denied"
  }
  async function askNotifPermission() {
    if (!notifSupported() || isIOSDevice()) return "unsupported";
    if (Notification.permission !== "default") return Notification.permission;
    try { return await Notification.requestPermission(); }
    catch(e) { return "denied"; }
  }
  function fireNotif(title, body, tag, onClick) {
    if (!notifSupported() || Notification.permission !== "granted") return;
    try {
      const n = new Notification(title, {
        body, tag: tag || "bht", renotify: true,
        icon: BHT_NOTIF_ICON, badge: BHT_NOTIF_ICON,
      });
      n.onclick = () => { window.focus(); if (onClick) onClick(); n.close(); };
    } catch(e) {}
  }

  /* ═══════════════════════════════════
     Helpers
     ═══════════════════════════════════ */
  const MOROCCAN_CITIES = [
    "Casablanca","Rabat","Marrakech","Fès","Tanger","Agadir","Meknès","Oujda",
    "Kenitra","Tétouan","El Jadida","Safi","Mohammedia","Khouribga","Beni Mellal",
    "Nador","Settat","Berrechid","Khénifra","Taza","Salé","Laayoune","Dakhla"
  ];

  function timeAgo(ts) {
    if (!ts) return "just now";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const s = Math.floor((Date.now() - d) / 1000);
    if (s < 60) return "just now";
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  }

  function formatNum(n) {
    if (!n) return 0;
    if (n >= 1000) return (n/1000).toFixed(1) + "k";
    return n;
  }

  /* Name-based color — consistent per name */
  const NAME_COLORS = [
    ["#2563eb","#1d4ed8"], // blue
    ["#7c3aed","#6d28d9"], // violet
    ["#ec4899","#db2777"], // pink
    ["#059669","#047857"], // green
    ["#dc2626","#b91c1c"], // red
    ["#d97706","#b45309"], // amber
    ["#0891b2","#0e7490"], // cyan
    ["#9333ea","#7e22ce"], // purple
    ["#16a34a","#15803d"], // emerald
    ["#ea580c","#c2410c"], // orange
  ];
  function nameColor(name) {
    if (!name) return NAME_COLORS[0];
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) % NAME_COLORS.length;
    return NAME_COLORS[Math.abs(h)];
  }

  /* ═══════════════════════════════════
     Hook: User ID (Firebase anon auth)
     ═══════════════════════════════════ */
  function useUserId() {
    const [uid, setUid] = useState(() => localStorage.getItem("aykono_uid") || null);
    useEffect(() => {
      if (!auth || !firebaseReady) {
        let id = localStorage.getItem("aykono_uid");
        if (!id) { id = "anon_" + Math.random().toString(36).slice(2); localStorage.setItem("aykono_uid", id); }
        setUid(id); return;
      }
      auth.signInAnonymously().then(r => {
        const id = r.user.uid;
        localStorage.setItem("aykono_uid", id);
        setUid(id);
      }).catch(() => {
        let id = localStorage.getItem("aykono_uid");
        if (!id) { id = "anon_" + Math.random().toString(36).slice(2); localStorage.setItem("aykono_uid", id); }
        setUid(id);
      });
    }, []);
    return uid;
  }

  /* ═══════════════════════════════════
     Starfield generator
     ═══════════════════════════════════ */
  function generateStars() {
    const container = document.getElementById("stars");
    if (!container) return;
    for (let i = 0; i < 120; i++) {
      const s = document.createElement("div");
      s.className = "star";
      const sz = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        width:${sz}px; height:${sz}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        --d:${Math.random()*4+2}s;
        animation-delay:${Math.random()*4}s;
      `;
      container.appendChild(s);
    }
  }

  /* ═══════════════════════════════════
     Toast Component
     ═══════════════════════════════════ */
  function Toast({ msg, onDone }) {
    useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
    return <div className="toast">{msg}</div>;
  }

  /* ═══════════════════════════════════
     LOADING SCREEN
     ═══════════════════════════════════ */
  function LoadingScreen() {
    const [tick, setTick] = useState(0);
    useEffect(() => {
      const iv = setInterval(() => setTick(t => t + 1), 400);
      return () => clearInterval(iv);
    }, []);
    return (
      <div style={{
        position:"fixed", inset:0, background:"#fffbf0",
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        zIndex:9999, gap:32
      }}>
        <div style={{ position:"absolute", width:400, height:400, borderRadius:"50%", background:"radial-gradient(circle, rgba(253,230,138,0.5) 0%, transparent 70%)", top:"5%", left:"5%", filter:"blur(60px)", pointerEvents:"none" }} />
        <div style={{ position:"absolute", width:300, height:300, borderRadius:"50%", background:"radial-gradient(circle, rgba(251,191,36,0.3) 0%, transparent 70%)", bottom:"5%", right:"5%", filter:"blur(60px)", pointerEvents:"none" }} />
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:20 }}>
          <div style={{
            width:90, height:90, borderRadius:26,
            background:"linear-gradient(135deg,#d97706,#f59e0b)",
            display:"flex", alignItems:"center", justifyContent:"center",
            animation:"bhtPulse 1.8s ease-in-out infinite",
            boxShadow:"0 0 60px rgba(217,119,6,0.4)"
          }}>
            <span style={{ fontFamily:"Syne,sans-serif", fontWeight:900, fontSize:48, color:"white", lineHeight:1, userSelect:"none" }}>B</span>
          </div>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontFamily:"Syne,sans-serif", fontWeight:900, fontSize:32, color:"#292200", letterSpacing:"-0.02em" }}>BHT</div>
            <div style={{ fontSize:11, color:"#92784a", letterSpacing:"0.18em", textTransform:"uppercase", marginTop:5 }}>Be Honest and True</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:8, marginTop:8 }}>
          {[0,1,2].map(i => (
            <div key={i} style={{
              width:8, height:8, borderRadius:"50%",
              background: tick % 3 === i ? "#d97706" : "rgba(217,119,6,0.2)",
              transform: tick % 3 === i ? "scale(1.4)" : "scale(1)",
              transition:"all 0.3s ease"
            }} />
          ))}
        </div>
        <style>{`@keyframes bhtPulse { 0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(217,119,6,0.35)} 50%{transform:scale(1.06);box-shadow:0 0 90px rgba(217,119,6,0.6)} }`}</style>
      </div>
    );
  }

  /* ═══════════════════════════════════
     Main App
     ═══════════════════════════════════ */
  function App() {
    const [page, setPage] = useState("home");
    const [posts, setPosts] = useState([]);
    const [loading, setLoading] = useState(true);
    const [appReady, setAppReady] = useState(false);
    const [showCreate, setShowCreate] = useState(false);
    const [showAdmin, setShowAdmin] = useState(false);
    const [adminAuthed, setAdminAuthed] = useState(false);
    const [selectedPost, setSelectedPost] = useState(null);
    const [toast, setToast] = useState(null);
    const uid = useUserId();
    const viewedThisSession = useRef(new Set());
    const secretClicks = useRef(0);
    const secretTimer = useRef(null);

    // ── Notification state ──────────────────────────────
    const [notifItems, setNotifItems]       = useState([]);   // personal notifs (comments on my posts)
    const [newBroadcasts, setNewBroadcasts] = useState([]);   // new posts from others
    const [notifPerm, setNotifPerm]         = useState(() => getNotifPerm());
    const [showPermBanner, setShowPermBanner] = useState(false);
    const [showNotifPanel, setShowNotifPanel] = useState(false);
    const lastVisitTsRef = useRef(parseInt(localStorage.getItem("bht_last_visit_ts") || "0"));
    const unreadPersonal = notifItems.filter(n => !n.read).length;
    const unreadCount = unreadPersonal + newBroadcasts.length;

    // ── PWA install prompt ──────────────────────────────
    const [pwaPrompt, setPwaPrompt] = useState(null);
    const [pwaInstalled, setPwaInstalled] = useState(false);
    useEffect(() => {
      const handler = e => { e.preventDefault(); setPwaPrompt(e); };
      window.addEventListener('beforeinstallprompt', handler);
      window.addEventListener('appinstalled', () => { setPwaInstalled(true); setPwaPrompt(null); });
      return () => window.removeEventListener('beforeinstallprompt', handler);
    }, []);
    const handleSecretClick = (e) => {
      e.stopPropagation();
      secretClicks.current += 1;
      clearTimeout(secretTimer.current);
      secretTimer.current = setTimeout(() => { secretClicks.current = 0; }, 1500);
      if (secretClicks.current >= 5) { secretClicks.current = 0; setShowAdmin(true); }
      else { setPage("home"); }
    };

    const showToast = (msg) => { setToast(msg); };
    const hideToast = () => setToast(null);

    // Show loading screen until data is ready (min 1.2s for smooth UX)
    useEffect(() => {
      if (!loading) {
        const t = setTimeout(() => setAppReady(true), 600);
        return () => clearTimeout(t);
      }
    }, [loading]);

    useEffect(() => { generateStars(); }, []);

    // ── Notification permission banner ─────────────────
    useEffect(() => {
      if (isIOSDevice() || !notifSupported()) return; // iOS Safari → no support
      if (notifPerm === "default") {
        const t = setTimeout(() => setShowPermBanner(true), 4000);
        return () => clearTimeout(t);
      }
    }, [notifPerm]);

    // Update last-visit timestamp so we know what's "new" next time
    useEffect(() => {
      const t = setTimeout(() => {
        localStorage.setItem("bht_last_visit_ts", Date.now().toString());
      }, 6000);
      return () => clearTimeout(t);
    }, []);

    // ── Listen to broadcasts (new posts from others) ────
    useEffect(() => {
      if (!uid || !firebaseReady || !db) return;
      let isInit = true; // local — resets every time uid changes and effect re-runs
      const unsub = db.collection("broadcasts")
        .orderBy("ts", "desc").limit(30)
        .onSnapshot(snap => {
          if (isInit) {
            isInit = false;
            // Show badge for posts created since last visit (but NOT own posts)
            const lastTs = lastVisitTsRef.current;
            const missed = snap.docs
              .map(d => ({ id: d.id, ...d.data() }))
              .filter(b => {
                if (b.authorUid === uid) return false;
                const bTs = b.ts?.toDate?.()?.getTime?.() || 0;
                return bTs > lastTs;
              });
            if (missed.length > 0) setNewBroadcasts(missed);
            return;
          }
          snap.docChanges().forEach(change => {
            if (change.type !== "added") return;
            const data = { id: change.doc.id, ...change.doc.data() };
            if (data.authorUid === uid) return; // own post → no notif
            // New posts → badge + panel + browser notification
            setNewBroadcasts(prev => [data, ...prev]);
            fireNotif(
              "📢 New post on BHT",
              `${data.postAuthorName || "Someone"}: ${data.preview || ""}`,
              "bht-new-post",
              () => setPage("posts")
            );
          });
        });
      return () => unsub();
    }, [uid]);

    // ── Listen to personal notifs (replies on my posts/comments) ──
    useEffect(() => {
      if (!uid || !firebaseReady || !db) return;
      let isInit = true; // local — resets every time uid changes
      const unsub = db.collection("notifs")
        .where("toUid", "==", uid)
        .orderBy("ts", "desc").limit(30)
        .onSnapshot(snap => {
          const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          if (!isInit) {
            snap.docChanges().forEach(change => {
              if (change.type === "added") {
                const data = { id: change.doc.id, ...change.doc.data() };
                if (!data.read) {
                  const isReact = data.type === "new_react";
                  const emojiMap = { like: "👍", haha: "😂", heart: "❤️" };
                  fireNotif(
                    isReact ? `${emojiMap[data.reactType] || "❤️"} New reaction on BHT` : "💬 New reply on BHT",
                    isReact
                      ? `Someone reacted ${emojiMap[data.reactType] || ""} to your post`
                      : `${data.fromName || "Someone"} replied: ${data.preview || ""}`,
                    isReact ? "bht-react" : "bht-reply",
                    () => {}
                  );
                }
              }
            });
          } else {
            isInit = false;
          }
          setNotifItems(all);
        });
      return () => unsub();
    }, [uid]);

    // ── Mark all notifications as read ─────────────────
    const markAllRead = useCallback(async () => {
      setNewBroadcasts([]);
      if (firebaseReady && db) {
        const unread = notifItems.filter(n => !n.read);
        if (unread.length > 0) {
          const batch = db.batch();
          unread.forEach(n => batch.update(db.collection("notifs").doc(n.id), { read: true }));
          try { await batch.commit(); } catch(e) {}
        }
      }
      setNotifItems(prev => prev.map(n => ({ ...n, read: true })));
    }, [notifItems]);

    /* Load posts from Firestore */
    useEffect(() => {
      if (!firebaseReady || !db) {
        // DEMO DATA when Firebase not configured
        setPosts([
          {
            id:"demo1", name:"StarWatcher99", content:"Sometimes I feel like the whole city is sleeping and I'm the only one awake, watching the lights flicker one by one.\n\nThere's something beautiful about 3am — when the world belongs to dreamers and night owls. Does anyone else feel this way?", city:"Casablanca",
            timestamp: { toDate: () => new Date(Date.now()-3600000) },
            viewCount:142, viewers:[], reactions:{like:["u1","u2"],haha:["u3"],heart:["u1"]},
            order:0, pinned:false, comments:[]
          },
          {
            id:"demo2", name:"OceanMind", content:"Overthinking is my cardio 🏃‍♂️\n\nBut seriously, why do we always replay conversations that happened 3 years ago at 2am?", city:"Rabat",
            timestamp: { toDate: () => new Date(Date.now()-7200000) },
            viewCount:89, viewers:[], reactions:{like:["u1"],haha:["u1","u2","u3"],heart:[]},
            order:1, pinned:false, comments:[]
          },
          {
            id:"demo3", name:"Moonchaser", content:"Hot take: the best version of yourself already exists.\n\nYou just haven't met them yet. Keep going.", city:"Marrakech",
            timestamp: { toDate: () => new Date(Date.now()-86400000) },
            viewCount:256, viewers:[], reactions:{like:["u1","u2","u3"],haha:[],heart:["u1","u2"]},
            order:2, pinned:false, comments:[]
          }
        ]);
        setLoading(false);
        return;
      }

      const unsub = db.collection("posts")
        .orderBy("timestamp", "desc")
        .onSnapshot(snap => {
          const ps = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          ps.sort((a,b) => {
            if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
            const ta = a.timestamp?.toDate?.() || new Date(0);
            const tb = b.timestamp?.toDate?.() || new Date(0);
            return tb - ta;
          });
          setPosts(ps);
          setLoading(false);
        }, () => setLoading(false));
      return () => unsub();
    }, []);

    /* Track view — fires once per session per post when posts are loaded */
    const trackView = useCallback(async (postId) => {
      if (!uid || !firebaseReady || !db) return;
      if (viewedThisSession.current.has(postId)) return;
      viewedThisSession.current.add(postId);
      const ref = db.collection("posts").doc(postId);
      try {
        const snap = await ref.get();
        if (!snap.exists) return;
        const viewers = snap.data().viewers || [];
        if (viewers.includes(uid)) return; // already viewed before
        await ref.update({
          viewers: firebase.firestore.FieldValue.arrayUnion(uid),
          viewCount: firebase.firestore.FieldValue.increment(1)
        });
      } catch(e) {}
    }, [uid]);

    /* Auto-track views when posts load */
    useEffect(() => {
      if (!uid || posts.length === 0) return;
      posts.forEach(p => trackView(p.id));
    }, [posts.length > 0 ? uid : null, posts.length]);

    /* Create post */
    const createPost = async (name, content, city, avatar) => {
      const post = {
        name, content, city, avatar: avatar || "🦊",
        authorUid: uid,
        timestamp: firebaseReady && db ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString(),
        viewCount: 0, viewers: [],
        reactions: { like: [], haha: [], heart: [] },
        order: posts.length, pinned: false
      };
      if (firebaseReady && db) {
        const docRef = await db.collection("posts").add(post);
        // Broadcast to all users
        try {
          await db.collection("broadcasts").add({
            type: "new_post",
            postId: docRef.id,
            authorUid: uid,
            postAuthorName: name || "Anonymous",
            preview: content.slice(0, 120),
            ts: firebase.firestore.FieldValue.serverTimestamp()
          });
        } catch(e) {}
      } else {
        // Demo mode
        setPosts(prev => [{ id: "post_" + Date.now(), ...post, timestamp: { toDate: () => new Date() } }, ...prev]);
      }
      showToast("✨ Post published!");
      setPage("posts");
    };

    /* ── Reactions: localStorage-first, Firebase best-effort ─────────────
       Only real user clicks are tracked — no default/fake reactions.
    ────────────────────────────────────────────────────────────────────── */
    const LS_KEY = "bht_reacts_v3"; // v3 = real reactions only (resets old fake data)

    function loadLocalReacts() {
      try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch { return {}; }
    }
    function saveLocalReacts(map) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(map)); } catch {}
    }

    // Apply merge whenever posts or uid changes
    const [mergedPosts, setMergedPosts] = useState([]);
    useEffect(() => {
      if (!uid) { setMergedPosts(posts); return; }
      const saved = loadLocalReacts();
      const result = posts.map(p => {
        // Only use a reaction if the user explicitly set one (saved key exists and is non-null)
        const myReact = saved.hasOwnProperty(p.id) ? saved[p.id] : null;
        const r = {
          like:  [...(p.reactions?.like  || [])].filter(u => u !== uid),
          haha:  [...(p.reactions?.haha  || [])].filter(u => u !== uid),
          heart: [...(p.reactions?.heart || [])].filter(u => u !== uid),
        };
        if (myReact) r[myReact] = [...r[myReact], uid];
        return { ...p, reactions: r };
      });
      setMergedPosts(result);
    }, [posts, uid]);

    const toggleReaction = async (postId, type) => {
      if (!uid) return;

      // 1. Read current saved state
      const saved = loadLocalReacts();
      const prev = saved.hasOwnProperty(postId) ? saved[postId] : null; // real only
      const next = prev === type ? null : type; // toggle off if same, else switch

      // 2. Save to localStorage instantly
      saved[postId] = next;
      saveLocalReacts(saved);

      // 3. Update UI immediately
      setMergedPosts(cur => cur.map(p => {
        if (p.id !== postId) return p;
        const r = {
          like:  [...(p.reactions?.like  || [])].filter(u => u !== uid),
          haha:  [...(p.reactions?.haha  || [])].filter(u => u !== uid),
          heart: [...(p.reactions?.heart || [])].filter(u => u !== uid),
        };
        if (next) r[next] = [...r[next], uid];
        return { ...p, reactions: r };
      }));

      // 4. Try to sync to Firebase (best-effort, silent on failure)
      if (firebaseReady && db) {
        const ref = db.collection("posts").doc(postId);
        const FV = firebase.firestore.FieldValue;
        const upd = {
          "reactions.like":  FV.arrayRemove(uid),
          "reactions.haha":  FV.arrayRemove(uid),
          "reactions.heart": FV.arrayRemove(uid),
        };
        if (next) upd[`reactions.${next}`] = FV.arrayUnion(uid);
        try { await ref.update(upd); } catch(e) { /* silent — localStorage already saved */ }

        // ── Notify post author about new reaction ──────────────────────
        if (next) {
          const thePost = mergedPosts.find(p => p.id === postId);
          if (thePost && thePost.authorUid && thePost.authorUid !== uid) {
            const emojiMap = { like: "👍", haha: "😂", heart: "❤️" };
            try {
              await db.collection("notifs").add({
                type: "new_react",
                postId,
                toUid: thePost.authorUid,
                fromUid: uid,
                fromName: "Someone",
                reactType: next,
                preview: `reacted ${emojiMap[next]} to your post`,
                ts: FV.serverTimestamp(),
                read: false
              });
            } catch(e) {}
          }
        }
      }
    };

    if (!appReady) return <LoadingScreen />;

    return (
      <div style={{ position:"relative", zIndex:1, minHeight:"100vh" }}>
        {/* NAV */}
        <nav style={{ padding:"0 24px", borderBottom:"1px solid var(--border)", background:"rgba(255,251,240,0.88)", backdropFilter:"blur(12px)", position:"sticky", top:0, zIndex:300 }}>
          <div style={{ maxWidth:800, margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"space-between", height:64 }}>
            <div style={{ cursor:"pointer", display:"flex", alignItems:"center", gap:10 }} onClick={handleSecretClick}>
              <div style={{ width:38, height:38, borderRadius:11, background:"linear-gradient(135deg,#d97706,#f59e0b)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Syne,sans-serif", fontWeight:900, fontSize:22, color:"white", flexShrink:0, userSelect:"none" }}>B</div>
              <span style={{ fontFamily:"Syne,sans-serif", fontWeight:800, fontSize:20, letterSpacing:"-0.02em" }}>BHT</span>
            </div>

            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <span className={`nav-link ${page==="home"?"active":""}`} onClick={() => setPage("home")}>Home</span>
              <span className={`nav-link ${page==="posts"?"active":""}`} onClick={() => setPage("posts")}>Posts</span>

              {/* PWA Install button */}
              {pwaPrompt && !pwaInstalled && (
                <button onClick={async () => { pwaPrompt.prompt(); const r = await pwaPrompt.userChoice; if (r.outcome === 'accepted') setPwaInstalled(true); setPwaPrompt(null); }}
                  style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 14px", borderRadius:10, border:"1px solid rgba(217,119,6,0.35)", background:"rgba(217,119,6,0.07)", color:"var(--teal)", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"DM Sans,sans-serif", transition:"all 0.2s", whiteSpace:"nowrap" }}
                  title="Install BHT as an app">
                  📲 Install App
                </button>
              )}

              {/* Notification Bell */}
              <div className="notif-wrap">
                <button className="notif-btn" title="Notifications"
                  onClick={() => { setShowNotifPanel(v => !v); if (!showNotifPanel) markAllRead(); }}>
                  🔔
                  {unreadCount > 0 && (
                    <span className="notif-badge">{unreadCount > 9 ? "9+" : unreadCount}</span>
                  )}
                </button>
                {showNotifPanel && (
                  <NotifPanel
                    broadcasts={newBroadcasts}
                    items={notifItems}
                    onClose={() => setShowNotifPanel(false)}
                    onGoToPosts={() => { setPage("posts"); setShowNotifPanel(false); }}
                  />
                )}
              </div>

            </div>
          </div>
        </nav>

        {/* PAGES */}
        <div style={{ maxWidth:800, margin:"0 auto", padding:"0 24px 80px" }}>
          {page === "home" && (
            <HomePage onWritePost={() => setShowCreate(true)} onViewPosts={() => setPage("posts")} posts={mergedPosts} uid={uid} onReact={toggleReaction} onOpenPost={p => setSelectedPost(p)} />
          )}
          {page === "posts" && (
            <PostsFeed
              posts={mergedPosts} loading={loading} uid={uid}
              onReact={toggleReaction} onOpenPost={p => { setSelectedPost(p); }}
              onWritePost={() => setShowCreate(true)}
            />
          )}
        </div>

        {/* MODALS */}
        {showCreate && (
          <CreatePostModal onClose={() => setShowCreate(false)} onSubmit={createPost} />
        )}
        {selectedPost && (
          <PostDetailModal
            post={mergedPosts.find(p => p.id === selectedPost.id) || selectedPost} uid={uid}
            onClose={() => setSelectedPost(null)}
            onReact={toggleReaction}
            isAdmin={adminAuthed}
            onDelete={async (pid) => {
              if (!window.confirm("Delete this post?")) return;
              if (firebaseReady && db) await db.collection("posts").doc(pid).delete();
              else setPosts(prev => prev.filter(p => p.id !== pid));
              setSelectedPost(null); showToast("Post deleted");
            }}
          />
        )}
        {showAdmin && (
          <AdminPanel
            posts={posts} authed={adminAuthed}
            onAuth={() => setAdminAuthed(true)}
            onClose={() => setShowAdmin(false)}
            setPosts={setPosts}
            showToast={showToast}
            db={db} firebaseReady={firebaseReady}
          />
        )}

  /* ═══════════════════════════════════
     POST CARD

    const lines = post.content?.split('\n') || [];

    return (
      <div className="glass post-card" style={{ marginBottom:16, padding:20, cursor:onClick?"pointer":"default", ...extraStyle }} onClick={onClick}>

        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:14 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:42, height:42, borderRadius:12, background: post.avatar ? "rgba(217,119,6,0.1)" : `linear-gradient(135deg, ${nameColor(post.name)[0]}, ${nameColor(post.name)[1]})`, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize: post.avatar ? 22 : 16, color:"white", flexShrink:0, border: post.avatar ? "1.5px solid rgba(217,119,6,0.2)" : "none" }}>

            <div>
              <div style={{ fontWeight:700, fontSize:15, display:"flex", alignItems:"center", gap:6 }}>
                <span className="name-tag" style={{ background:`linear-gradient(135deg, ${nameColor(post.name)[0]}, ${nameColor(post.name)[1]})` }}>{post.name}</span>
                {post.isAdminPost && <span className="admin-badge" style={{ marginLeft:4 }}>ADMIN</span>}
              </div>
              <div style={{ fontSize:12, color:"var(--muted)", marginTop:2 }}>{timeAgo(post.timestamp)}</div>
            </div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            {post.city && (
              <div className="city-badge">

        <div style={{ fontSize:15, lineHeight:1.75, color:"var(--text)", marginBottom:16 }}>

            <p key={i} style={{ minHeight:"1.75em" }}>{line || <br/>}</p>

  /* ═══════════════════════════════════
     CREATE POST MODAL
     ═══════════════════════════════════ */
  function CreatePostModal({ onClose, onSubmit }) {
    const AVATARS = [
      "😤","😏","🤙","💀","🔥","👊","😈","🤑","😎","🥷",
      "🐍","🦈","🐺","🦊","🦁","🐯","🦅","🦂","🐉","🦖",
      "👾","🤖","💣","⚡","🌪","💥","🎯","🃏","🎰","🎭",
      "🥊","🏴","⚔️","🗡️","🔱","☠️","🎪","🤿","🛸","🪖",
      "🧊","🌑","🌊","🌋","⛈️","🌀","🌙","💫","🕳️","🪐"
    ];
    const [step, setStep] = useState(1); // 1=name, 2=content
    const [name, setName] = useState("");
    const [avatar, setAvatar] = useState("🦊");
    const [content, setContent] = useState("");
    const [city, setCity] = useState("");
    const [loading, setLoading] = useState(false);
    const [err, setErr] = useState("");

    const handleSubmit = async () => {
      const trimmedName = name.trim();
      if (!trimmedName || trimmedName.length < 4) { setErr("الاسم مطلوب ويجب أن يكون 4 أحرف على الأقل!"); return; }
      if (!content.trim()) { setErr("Write something!"); return; }
      setLoading(true);
      await onSubmit(trimmedName, content, city, avatar);
      setLoading(false);
      onClose();
    };

    return (
      <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="glass" style={{ width:"100%", maxWidth:520, borderRadius:20, padding:32, position:"relative" }}>
          <button onClick={onClose} style={{ position:"absolute", top:16, right:16, background:"none", border:"none", color:"var(--muted)", fontSize:22, cursor:"pointer", lineHeight:1 }}>×</button>

          <h2 style={{ fontSize:24, fontWeight:800, marginBottom:6 }}>
            {step===1 ? "👤 Who are you?" : "✍️ What's on your mind?"}
          </h2>
          <p style={{ color:"var(--muted)", fontSize:14, marginBottom:28 }}>
            {step===1 ? "Choose a name — min 4 characters, required" : "Write freely. No one knows it's you."}
          </p>

          {step === 1 ? (
            <>
              <label style={{ display:"block", fontSize:13, color:"var(--muted)", fontWeight:600, marginBottom:10 }}>🎭 Pick your avatar</label>
              <div className="avatar-grid">
                {AVATARS.map(a => (
                  <div key={a} className={`avatar-option ${avatar===a?"selected":""}`} onClick={() => setAvatar(a)} title={a}>{a}</div>
                ))}
              </div>

              <input className="inp" placeholder="Your name (required, min 4 chars)..." value={name} onChange={e => { setName(e.target.value); setErr(""); }} maxLength={30} style={{ marginTop:8 }} />
              {err && <p style={{ color:"var(--coral)", fontSize:13, marginTop:6 }}>{err}</p>}
              <div style={{ fontSize:12, color:"var(--coral)", marginTop:8, marginBottom:24 }}>⚠️ Name required (min 4 chars) — no anonymous posting</div>

              <label style={{ display:"block", marginBottom:8, fontSize:13, color:"var(--muted)", fontWeight:600 }}>📍 Your City</label>
              <input className="inp" placeholder="Enter your city..." value={city} onChange={e => setCity(e.target.value)} maxLength={40} style={{ marginBottom:28 }} />

              <button className="btn-primary" style={{ width:"100%" }} onClick={() => {
                if (!name.trim() || name.trim().length < 4) { setErr("Name required (min 4 characters)!"); return; }
                setErr(""); setStep(2);
              }}>
                Continue →
              </button>
            </>
          ) : (
            <>
              <textarea className="inp" placeholder="Share your thoughts, confession, feeling... You can use Enter to make paragraphs." value={content} onChange={e => { setContent(e.target.value); setErr(""); }} style={{ minHeight:180 }} />
              {err && <p style={{ color:"var(--coral)", fontSize:13, marginTop:6 }}>{err}</p>}

              <div style={{ fontSize:12, color:"var(--muted)", marginTop:8, marginBottom:24 }}>
                Tip: Press Enter to create paragraphs ↵
              </div>

              <div style={{ display:"flex", gap:10 }}>
                <button onClick={() => setStep(1)} style={{ flex:1, padding:12, border:"1px solid var(--border)", borderRadius:10, background:"transparent", color:"var(--muted)", cursor:"pointer", fontFamily:"DM Sans,sans-serif" }}>← Back</button>
                <button className="btn-primary" style={{ flex:2 }} onClick={handleSubmit} disabled={loading}>
                  {loading ? "Posting..." : "🚀 Publish"}
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    );
  }

  /* ═══════════════════════════════════
     POST DETAIL MODAL
     ═══════════════════════════════════ */
  function PostDetailModal({ post, uid, onClose, onReact, isAdmin, onDelete }) {
    const [comments, setComments] = useState([]);
    const [commentText, setCommentText] = useState("");
    const [commentName, setCommentName] = useState("");
    const [loading, setLoading] = useState(true);
    const [submitting, setSubmitting] = useState(false);

    const reactions = post.reactions || { like:[], haha:[], heart:[] };
    const myReact = uid ? (reactions.like?.includes(uid) ? "like" : reactions.haha?.includes(uid) ? "haha" : reactions.heart?.includes(uid) ? "heart" : null) : null;
    const lines = post.content?.split('\n') || [];

    useEffect(() => {
      if (!firebaseReady || !db) {
        setComments([
          { id:"c1", name:"Luna", text:"This is so relatable 🌙", timestamp:{ toDate:()=>new Date(Date.now()-1800000) }, isAdmin:false },
          { id:"c2", name:"✦ Aykono Team", text:"Thank you for sharing ✨", timestamp:{ toDate:()=>new Date(Date.now()-900000) }, isAdmin:true }
        ]);
        setLoading(false);
        return;
      }
      const unsub = db.collection("posts").doc(post.id).collection("comments")
        .orderBy("timestamp", "asc").onSnapshot(snap => {
          setComments(snap.docs.map(d => ({ id:d.id, ...d.data() })));
          setLoading(false);
        }, () => setLoading(false));
      return () => unsub();
    }, [post.id]);

    const submitComment = async () => {
      const trimmedName = commentName.trim();
      const trimmedText = commentText.trim();
      if (!trimmedName || trimmedName.length < 4) {
        alert("Name is required (min 4 characters)!");
        return;
      }
      if (!trimmedText) return;
      // No duplicate names in same post
      const duplicate = comments.find(c => !c.isAdmin && c.name?.toLowerCase() === trimmedName.toLowerCase());
      if (duplicate) {
        alert(`The name "${trimmedName}" is already used in this post. Please choose a different name.`);
        return;
      }
      setSubmitting(true);
      const data = {
        name: trimmedName,
        text: trimmedText,
        uid: uid || null,
        timestamp: firebaseReady && db ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString(),
        isAdmin: false
      };
      if (firebaseReady && db) {
        await db.collection("posts").doc(post.id).collection("comments").add(data);
        // Track commenter uid in post doc for future notifications
        const postUpdate = { commentCount: firebase.firestore.FieldValue.increment(1) };
        if (uid) postUpdate.commenterUids = firebase.firestore.FieldValue.arrayUnion(uid);
        await db.collection("posts").doc(post.id).update(postUpdate);

        // ── Write notifications ──────────────────────────
        if (uid) {
          const commenterName = trimmedName;
          const preview = commentText.trim().slice(0, 120);
          const notifBase = {
            type: "new_comment",
            postId: post.id,
            postAuthorName: post.name || "Anonymous",
            fromName: commenterName,
            preview,
            ts: firebase.firestore.FieldValue.serverTimestamp(),
            read: false
          };
          const toNotify = new Set();
          // 1. Notify post author (if they're someone else)
          if (post.authorUid && post.authorUid !== uid) toNotify.add(post.authorUid);
          // 2. Notify previous commenters on this post
          if (Array.isArray(post.commenterUids)) {
            post.commenterUids.forEach(cu => { if (cu && cu !== uid) toNotify.add(cu); });
          }
          for (const toUid of toNotify) {
            try { await db.collection("notifs").add({ ...notifBase, toUid }); } catch(e) {}
          }
        }
      } else {
        setComments(prev => [...prev, { id:"c_"+Date.now(), ...data, timestamp:{ toDate:()=>new Date() } }]);
      }
      setCommentText(""); setCommentName(""); setSubmitting(false);
    };

    const deleteComment = async (cid) => {
      if (!window.confirm("Delete this comment?")) return;
      if (firebaseReady && db) {
        await db.collection("posts").doc(post.id).collection("comments").doc(cid).delete();
        await db.collection("posts").doc(post.id).update({ commentCount: firebase.firestore.FieldValue.increment(-1) });
      } else {
        setComments(prev => prev.filter(c => c.id !== cid));
      }
    };

    return (
      <div className="modal-bg" style={{ alignItems:"flex-start", paddingTop:40 }} onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="glass" style={{ width:"100%", maxWidth:600, borderRadius:20, maxHeight:"80vh", overflow:"auto", position:"relative" }}>
          {/* Header */}
          <div style={{ padding:"20px 24px 0", position:"sticky", top:0, background:"rgba(255,251,240,0.97)", backdropFilter:"blur(12px)", zIndex:10, borderBottom:"1px solid var(--border)", marginBottom:0 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:40, height:40, borderRadius:12, background: post.avatar ? "rgba(217,119,6,0.1)" : `linear-gradient(135deg, ${nameColor(post.name)[0]}, ${nameColor(post.name)[1]})`, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize: post.avatar ? 20 : 15, color:"white", border: post.avatar ? "1.5px solid rgba(217,119,6,0.2)" : "none" }}>
                  {post.avatar || post.name?.charAt(0).toUpperCase()}
                </div>
                <div>
                  <div style={{ fontWeight:700, display:"flex", alignItems:"center", gap:6 }}>
                    <span className="name-tag" style={{ background:`linear-gradient(135deg, ${nameColor(post.name)[0]}, ${nameColor(post.name)[1]})` }}>{post.name}</span>
                  </div>
                  <div style={{ fontSize:12, color:"var(--muted)" }}>{timeAgo(post.timestamp)} · {post.city}</div>
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                {isAdmin && (
                  <button onClick={() => onDelete(post.id)} style={{ background:"rgba(255,107,107,0.1)", border:"1px solid rgba(255,107,107,0.3)", color:"var(--coral)", padding:"5px 12px", borderRadius:8, cursor:"pointer", fontSize:12, fontFamily:"DM Sans,sans-serif" }}>
                    🗑 Delete
                  </button>
                )}
                <button onClick={onClose} style={{ background:"rgba(255,255,255,0.05)", border:"none", color:"var(--muted)", width:32, height:32, borderRadius:8, cursor:"pointer", fontSize:18 }}>×</button>
              </div>
            </div>
          </div>

          {/* Content */}
          <div style={{ padding:"20px 24px" }}>
            <div style={{ fontSize:16, lineHeight:1.8, marginBottom:24 }}>
              {lines.map((line, i) => <p key={i} style={{ minHeight:"1.8em" }}>{line || <br/>}</p>)}
            </div>

            {/* Reactions */}
            <div style={{ display:"flex", gap:10, marginBottom:24, flexWrap:"wrap" }}>
              {[{type:"like",emoji:"👍"},{type:"haha",emoji:"😂"},{type:"heart",emoji:"❤️"}].map(r => (
                <button key={r.type} className={`react-btn ${myReact===r.type?`active-${r.type}`:""}`}
                  onClick={() => onReact(post.id, r.type)} style={{ fontSize:14, padding:"7px 16px" }}>
                  {r.emoji} {reactions[r.type]?.length || 0}
                </button>
              ))}
              <span className="view-badge" style={{ marginLeft:"auto", alignSelf:"center" }}>👁️ {formatNum(post.viewCount||0)} views</span>
            </div>

            <div className="divider"></div>

            {/* Comments */}
            <h3 style={{ fontWeight:700, fontSize:16, marginBottom:16 }}>Comments ({comments.length})</h3>

            {loading ? (
              <div style={{ textAlign:"center", padding:20, color:"var(--muted)", fontSize:14 }}>Loading...</div>
            ) : comments.length === 0 ? (
              <div style={{ textAlign:"center", padding:20, color:"var(--muted)", fontSize:14 }}>
                Be the first to comment 👇
              </div>
            ) : (
              <div style={{ marginBottom:20 }}>
                {comments.map(c => (
                  <div key={c.id} className="comment-item" style={{ marginBottom:8 }}>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontWeight:700, fontSize:14 }}>
                          {c.isAdmin ? (
                            <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
                              <span style={{ background:"linear-gradient(135deg,#7c3aed,#db2777)", color:"white", padding:"2px 10px", borderRadius:999, fontSize:11, fontWeight:800, letterSpacing:"0.04em" }}>✦ BHT Team</span>
                            </span>
                          ) : (
                            <span className="name-tag" style={{ background:`linear-gradient(135deg, ${nameColor(c.name)[0]}, ${nameColor(c.name)[1]})` }}>
                              {c.name}
                            </span>
                          )}
                        </span>
                        <span style={{ fontSize:11, color:"var(--muted)" }}>{timeAgo(c.timestamp)}</span>
                      </div>
                      {isAdmin && (
                        <button onClick={() => deleteComment(c.id)} style={{ background:"none", border:"none", color:"var(--muted)", cursor:"pointer", fontSize:14, padding:2 }}>×</button>
                      )}
                    </div>
                    <p style={{ fontSize:14, color:"var(--text)", lineHeight:1.6 }}>{c.text}</p>
                  </div>
                ))}
              </div>
            )}

            {/* Add comment form */}
            <div style={{ marginTop:16 }}>
              <input className="inp" placeholder="Your name (required, min 4 chars)" value={commentName} onChange={e => setCommentName(e.target.value)} maxLength={30} style={{ marginBottom:8, fontSize:13 }} />
              <div style={{ display:"flex", gap:8 }}>
                <input className="inp" placeholder="Add a comment..." value={commentText} onChange={e => setCommentText(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && !e.shiftKey && submitComment()} />
                <button className="btn-primary" style={{ flexShrink:0, padding:"0 20px", fontSize:13 }} onClick={submitComment} disabled={submitting}>
                  {submitting ? "..." : "Send"}
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ═══════════════════════════════════
     ADMIN PANEL
     ═══════════════════════════════════ */
  function AdminPanel({ posts, authed, onAuth, onClose, setPosts, showToast, db, firebaseReady }) {
    const [email, setEmail] = useState("");
    const [pw, setPw] = useState("");
    const [err, setErr] = useState("");
    const [loading, setLoading] = useState(false);
    const [activeTab, setActiveTab] = useState("posts");
    const [editingViews, setEditingViews] = useState(null);
    const [newViewCount, setNewViewCount] = useState(0);
    const [adminComment, setAdminComment] = useState({ postId:"", text:"" });
    const [allComments, setAllComments] = useState({});

    const handleAuth = async () => {
      if (!email.trim() || !pw.trim()) { setErr("Enter email and password"); return; }
      setLoading(true); setErr("");
      // Try Firebase Auth first
      if (firebaseReady && auth) {
        try {
          await auth.signInWithEmailAndPassword(email.trim(), pw);
          onAuth(); setLoading(false); return;
        } catch(e) {
          // Fallback: check against hardcoded admin creds
        }
      }
      // Fallback: email + password match
      if (email.trim() === ADMIN_EMAIL && pw === ADMIN_PASSWORD) { onAuth(); }
      else { setErr("Wrong email or password"); }
      setLoading(false);
    };

    const deletePost = async (pid) => {
      if (!window.confirm("Delete this post?")) return;
      if (firebaseReady && db) await db.collection("posts").doc(pid).delete();
      else setPosts(prev => prev.filter(p => p.id !== pid));
      showToast("Post deleted");
    };

    const updateViewCount = async (pid) => {
      if (firebaseReady && db) await db.collection("posts").doc(pid).update({ viewCount: Number(newViewCount) });
      else setPosts(prev => prev.map(p => p.id===pid ? {...p, viewCount:Number(newViewCount)} : p));
      setEditingViews(null);
      showToast("Views updated");
    };

    const updateReactionCount = async (pid, type, count) => {
      // Manipulate reaction array to match desired count (pad with fake IDs)
      const arr = Array.from({length: Math.max(0, Number(count))}, (_, i) => `admin_pad_${i}`);
      if (firebaseReady && db) await db.collection("posts").doc(pid).update({ [`reactions.${type}`]: arr });
      else setPosts(prev => prev.map(p => p.id===pid ? {...p, reactions:{...p.reactions,[type]:arr}} : p));
      showToast("Reaction updated");
    };

    const movePost = async (pid, dir) => {
      const idx = posts.findIndex(p => p.id === pid);
      if ((dir === -1 && idx === 0) || (dir === 1 && idx === posts.length-1)) return;
      const newPosts = [...posts];
      [newPosts[idx], newPosts[idx+dir]] = [newPosts[idx+dir], newPosts[idx]];
      // Update order field
      if (firebaseReady && db) {
        const batch = db.batch();
        newPosts.forEach((p, i) => batch.update(db.collection("posts").doc(p.id), { order: i }));
        await batch.commit();
      } else {
        setPosts(newPosts);
      }
      showToast("Order updated");
    };

    const postAdminComment = async () => {
      if (!adminComment.text.trim() || !adminComment.postId) return;
      const data = {
        name: ADMIN_DISPLAY_NAME, text: adminComment.text,
        timestamp: firebaseReady && db ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString(),
        isAdmin: true
      };
      if (firebaseReady && db) {
        await db.collection("posts").doc(adminComment.postId).collection("comments").add(data);
        await db.collection("posts").doc(adminComment.postId).update({ commentCount: firebase.firestore.FieldValue.increment(1) });
      }
      setAdminComment({ postId:"", text:"" });
      showToast("Admin comment added ✓");
    };

    const togglePin = async (pid, current) => {
      if (firebaseReady && db) await db.collection("posts").doc(pid).update({ pinned: !current });
      else setPosts(prev => prev.map(p => p.id===pid ? {...p, pinned:!current} : p));
      showToast(current ? "Post unpinned" : "Post pinned 📌");
    };

    if (!authed) {
      return (
        <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="glass" style={{ width:"100%", maxWidth:400, borderRadius:20, padding:36 }}>
            <div style={{ fontSize:32, textAlign:"center", marginBottom:8 }}>🔐</div>
            <h2 style={{ textAlign:"center", fontSize:22, fontWeight:800, marginBottom:6 }}>Admin Access</h2>
            <p style={{ textAlign:"center", color:"var(--muted)", fontSize:13, marginBottom:28 }}>Enter your credentials to continue</p>
            <input className="inp" type="email" placeholder="Email..." value={email} onChange={e => { setEmail(e.target.value); setErr(""); }}
              onKeyDown={e => e.key === "Enter" && handleAuth()} style={{ marginBottom:10 }} />
            <input className="inp" type="password" placeholder="Password..." value={pw} onChange={e => { setPw(e.target.value); setErr(""); }}
              onKeyDown={e => e.key === "Enter" && handleAuth()} style={{ marginBottom:8 }} />
            {err && <p style={{ color:"var(--coral)", fontSize:13, marginBottom:12 }}>{err}</p>}
            <div style={{ display:"flex", gap:10, marginTop:16 }}>
              <button onClick={onClose} style={{ flex:1, padding:12, border:"1px solid var(--border)", borderRadius:10, background:"transparent", color:"var(--muted)", cursor:"pointer", fontFamily:"DM Sans,sans-serif" }}>Cancel</button>
              <button className="btn-primary" style={{ flex:1 }} onClick={handleAuth} disabled={loading}>{loading ? "..." : "Enter →"}</button>
            </div>
          </div>
        </div>
      );
    }

    const tabs = [
      { id:"posts", label:"📝 Posts" },
      { id:"comment", label:"💬 Comment" },
      { id:"stats", label:"📊 Stats" }
    ];

    return (
      <div className="modal-bg" style={{ alignItems:"flex-start", paddingTop:40 }} onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="glass" style={{ width:"100%", maxWidth:700, borderRadius:20, maxHeight:"85vh", overflow:"auto" }}>
          {/* Admin header */}
          <div style={{ padding:"20px 24px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, background:"rgba(255,251,240,0.98)", backdropFilter:"blur(12px)", zIndex:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ background:"linear-gradient(135deg,#7c3aed,#db2777)", padding:"6px 14px", borderRadius:10, fontFamily:"Syne,sans-serif", fontWeight:800, fontSize:14 }}>
                ✦ ADMIN
              </div>
              <span style={{ color:"var(--muted)", fontSize:13 }}>{posts.length} posts total</span>
            </div>
            <button onClick={onClose} style={{ background:"rgba(255,255,255,0.05)", border:"none", color:"var(--muted)", width:32, height:32, borderRadius:8, cursor:"pointer", fontSize:18 }}>×</button>
          </div>

          {/* Tabs */}
          <div style={{ display:"flex", gap:4, padding:"12px 24px", borderBottom:"1px solid var(--border)" }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)}
                style={{ padding:"7px 16px", borderRadius:8, border:`1px solid ${activeTab===t.id?"var(--teal)":"var(--border)"}`, background: activeTab===t.id?"rgba(15,255,212,0.08)":"transparent", color: activeTab===t.id?"var(--teal)":"var(--muted)", cursor:"pointer", fontFamily:"DM Sans,sans-serif", fontSize:13, fontWeight:600, transition:"all 0.15s" }}>
                {t.label}
              </button>
            ))}
          </div>

          <div style={{ padding:24 }}>

            {/* POSTS TAB */}
            {activeTab === "posts" && (
              <div>
                <p style={{ color:"var(--muted)", fontSize:13, marginBottom:16 }}>Manage, reorder, and edit posts. Posts are sorted by date (newest first).</p>
                {posts.map((p, idx) => (
                  <div key={p.id} className="admin-row">
                    <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12 }}>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                          {p.pinned && <span style={{ fontSize:12, color:"var(--gold)" }}>📌</span>}
                          <span style={{ fontWeight:700, fontSize:14, color:"var(--teal)" }}>{p.name}</span>
                          <span className="city-badge" style={{ fontSize:11 }}>📍{p.city}</span>
                          <span style={{ fontSize:11, color:"var(--muted)" }}>{timeAgo(p.timestamp)}</span>
                        </div>
                        <p style={{ fontSize:13, color:"var(--muted)", lineHeight:1.5, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>
                          {p.content}
                        </p>
                        <div style={{ display:"flex", alignItems:"center", gap:14, marginTop:8 }}>
                          <span style={{ fontSize:12, color:"var(--muted)" }}>👁️ {p.viewCount||0} views</span>
                          <span style={{ fontSize:12, color:"var(--muted)" }}>👍 {p.reactions?.like?.length||0} · 😂 {p.reactions?.haha?.length||0} · ❤️ {p.reactions?.heart?.length||0}</span>
                        </div>
                      </div>

                      <div style={{ display:"flex", flexDirection:"column", gap:6, flexShrink:0 }}>
                        {/* Order controls */}
                        <div style={{ display:"flex", gap:4 }}>
                          <button onClick={() => movePost(p.id, -1)} style={{ width:28, height:28, background:"rgba(255,255,255,0.05)", border:"1px solid var(--border)", borderRadius:6, cursor:"pointer", color:"var(--muted)", fontSize:12 }} disabled={idx===0}>↑</button>
                          <button onClick={() => movePost(p.id, 1)} style={{ width:28, height:28, background:"rgba(255,255,255,0.05)", border:"1px solid var(--border)", borderRadius:6, cursor:"pointer", color:"var(--muted)", fontSize:12 }} disabled={idx===posts.length-1}>↓</button>
                          <button onClick={() => togglePin(p.id, p.pinned)} style={{ width:28, height:28, background: p.pinned?"rgba(255,209,102,0.1)":"rgba(255,255,255,0.05)", border:`1px solid ${p.pinned?"var(--gold)":"var(--border)"}`, borderRadius:6, cursor:"pointer", color: p.pinned?"var(--gold)":"var(--muted)", fontSize:12 }}>📌</button>
                          <button onClick={() => deletePost(p.id)} style={{ width:28, height:28, background:"rgba(255,107,107,0.1)", border:"1px solid rgba(255,107,107,0.3)", borderRadius:6, cursor:"pointer", color:"var(--coral)", fontSize:14 }}>×</button>
                        </div>

                        {/* Edit views */}
                        {editingViews === p.id ? (
                          <div style={{ display:"flex", gap:4 }}>
                            <input type="number" value={newViewCount} onChange={e=>setNewViewCount(e.target.value)} style={{ width:70, background:"rgba(255,255,255,0.05)", border:"1px solid var(--teal)", borderRadius:6, padding:"3px 6px", color:"var(--text)", fontSize:12 }} />
                            <button onClick={() => updateViewCount(p.id)} style={{ background:"rgba(15,255,212,0.1)", border:"1px solid var(--teal)", borderRadius:6, padding:"3px 8px", cursor:"pointer", color:"var(--teal)", fontSize:11, fontFamily:"DM Sans,sans-serif" }}>✓</button>
                            <button onClick={() => setEditingViews(null)} style={{ background:"none", border:"1px solid var(--border)", borderRadius:6, padding:"3px 6px", cursor:"pointer", color:"var(--muted)", fontSize:12 }}>✕</button>
                          </div>
                        ) : (
                          <button onClick={() => { setEditingViews(p.id); setNewViewCount(p.viewCount||0); }}
                            style={{ background:"rgba(255,255,255,0.04)", border:"1px solid var(--border)", borderRadius:6, padding:"3px 10px", cursor:"pointer", color:"var(--muted)", fontSize:11, fontFamily:"DM Sans,sans-serif", whiteSpace:"nowrap" }}>
                            ✏️ Edit views
                          </button>
                        )}

                        {/* Edit reactions */}
                        <div style={{ display:"flex", gap:4 }}>
                          {[["like","👍"],["haha","😂"],["heart","❤️"]].map(([type, emoji]) => (
                            <button key={type}
                              onClick={() => {
                                const cnt = window.prompt(`Set ${emoji} count for this post:`, (p.reactions?.[type]?.length||0).toString());
                                if (cnt !== null && !isNaN(cnt)) updateReactionCount(p.id, type, cnt);
                              }}
                              style={{ background:"rgba(255,255,255,0.04)", border:"1px solid var(--border)", borderRadius:6, padding:"3px 8px", cursor:"pointer", color:"var(--muted)", fontSize:11 }}>
                              {emoji}{p.reactions?.[type]?.length||0}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* COMMENT AS ADMIN */}
            {activeTab === "comment" && (
              <div>
                <p style={{ color:"var(--muted)", fontSize:13, marginBottom:20 }}>Comment on a post as <strong style={{ color:"white" }}>{ADMIN_DISPLAY_NAME}</strong> — your comment will have the admin badge.</p>
                <div style={{ marginBottom:16 }}>
                  <label style={{ display:"block", fontSize:13, color:"var(--muted)", fontWeight:600, marginBottom:6 }}>Select Post</label>
                  <select className="inp" value={adminComment.postId} onChange={e => setAdminComment(a=>({...a,postId:e.target.value}))}>
                    <option value="">— Choose a post —</option>
                    {posts.map(p => <option key={p.id} value={p.id}>{p.name}: {p.content?.slice(0,60)}...</option>)}
                  </select>
                </div>
                <div style={{ marginBottom:16 }}>
                  <label style={{ display:"block", fontSize:13, color:"var(--muted)", fontWeight:600, marginBottom:6 }}>Comment</label>
                  <textarea className="inp" placeholder="Write your admin comment..." value={adminComment.text} onChange={e => setAdminComment(a=>({...a,text:e.target.value}))} style={{ minHeight:100 }} />
                </div>
                <button className="btn-primary" disabled={!adminComment.postId||!adminComment.text.trim()} onClick={postAdminComment}>
                  ✦ Post as Admin
                </button>
              </div>
            )}

            {/* STATS */}
            {activeTab === "stats" && (
              <div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:12, marginBottom:24 }}>
                  {[
                    { label:"Total Posts", val:posts.length, icon:"📝" },
                    { label:"Total Views", val:posts.reduce((a,p)=>a+(p.viewCount||0),0), icon:"👁️" },
                    { label:"Total Likes", val:posts.reduce((a,p)=>a+(p.reactions?.like?.length||0),0), icon:"👍" },
                    { label:"Total Hearts", val:posts.reduce((a,p)=>a+(p.reactions?.heart?.length||0),0), icon:"❤️" },
                    { label:"Total Hahas", val:posts.reduce((a,p)=>a+(p.reactions?.haha?.length||0),0), icon:"😂" },
                    { label:"Pinned Posts", val:posts.filter(p=>p.pinned).length, icon:"📌" }
                  ].map(s => (
                    <div key={s.label} style={{ padding:20, background:"rgba(255,255,255,0.03)", borderRadius:12, border:"1px solid var(--border)" }}>
                      <div style={{ fontSize:24, marginBottom:4 }}>{s.icon}</div>
                      <div style={{ fontFamily:"Syne,sans-serif", fontSize:28, fontWeight:800, color:"var(--teal)" }}>{formatNum(s.val)}</div>
                      <div style={{ fontSize:12, color:"var(--muted)", marginTop:2 }}>{s.label}</div>
                    </div>
                  ))}
                </div>
                <p style={{ fontSize:13, color:"var(--muted)" }}>Top 3 most viewed posts:</p>
                {[...posts].sort((a,b)=>(b.viewCount||0)-(a.viewCount||0)).slice(0,3).map(p => (
                  <div key={p.id} style={{ marginTop:8, padding:"10px 14px", background:"rgba(255,255,255,0.03)", borderRadius:10, border:"1px solid var(--border)", display:"flex", justifyContent:"space-between" }}>
                    <span style={{ fontSize:13 }}><strong>{p.name}</strong>: {p.content?.slice(0,50)}...</span>
                    <span style={{ color:"var(--teal)", fontSize:13, fontWeight:700, flexShrink:0 }}>👁️ {p.viewCount||0}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  /* ═══════════════════════════════════════════════
     🔔 NOTIFICATION PERMISSION BANNER
     ═══════════════════════════════════════════════ */
  function NotifPermBanner({ onAllow, onDismiss }) {
    return (
      <div className="perm-banner">
        <div style={{ display:"flex", alignItems:"center", gap:12, flex:1, minWidth:220 }}>
          <div style={{ width:40, height:40, borderRadius:12, background:"rgba(217,119,6,0.1)", border:"1px solid rgba(217,119,6,0.2)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>🔔</div>
          <div>
            <div style={{ fontWeight:700, fontSize:14, color:"var(--text)" }}>Enable notifications</div>
            <div style={{ fontSize:12, color:"var(--muted)", marginTop:2 }}>Get notified for new posts, reactions & replies to your posts</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:8, flexShrink:0 }}>
          <button onClick={onDismiss} style={{ padding:"8px 16px", border:"1px solid var(--border)", borderRadius:8, background:"transparent", color:"var(--muted)", cursor:"pointer", fontSize:13, fontFamily:"DM Sans,sans-serif" }}>
            Later
          </button>
          <button className="btn-primary" style={{ padding:"8px 20px", fontSize:13 }} onClick={onAllow}>
            Allow 🔔
          </button>
        </div>
      </div>
    );
  }

  /* ═══════════════════════════════════════════════
     🔔 NOTIFICATION PANEL DROPDOWN
     ═══════════════════════════════════════════════ */
  function NotifPanel({ broadcasts, items, onClose, onGoToPosts }) {
    const emojiMap = { like: "👍", haha: "😂", heart: "❤️" };

    const broadcastItems = broadcasts.map(b => ({
      id: b.id, type: "new_post",
      icon: "📢",
      title: "New post",
      body: `${b.postAuthorName || "Someone"}: ${b.preview || ""}`,
      ts: b.ts,
      read: false,
      onClick: onGoToPosts
    }));

    const personalItems = items.map(n => {
      const isReact = n.type === "new_react";
      return {
        id: n.id,
        type: n.type || "new_comment",
        icon: isReact ? (emojiMap[n.reactType] || "❤️") : "💬",
        title: isReact ? "New reaction on your post" : n.type === "new_reply" ? "New reply" : "New comment",
        body: isReact
          ? `Someone reacted ${emojiMap[n.reactType] || ""} to your post`
          : `${n.fromName || "Someone"}: ${n.preview || ""}`,
        ts: n.ts,
        read: n.read || false,
        onClick: onGoToPosts
      };
    });

    const allItems = [...broadcastItems, ...personalItems].sort((a, b) => {
      const ta = a.ts?.toDate?.()?.getTime?.() || 0;
      const tb = b.ts?.toDate?.()?.getTime?.() || 0;
      return tb - ta;
    });

    return (
      <div className="notif-panel" onClick={e => e.stopPropagation()}>
        {/* Header */}
        <div style={{ padding:"14px 16px 10px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, background:"white", zIndex:1 }}>
          <span style={{ fontFamily:"Syne,sans-serif", fontWeight:800, fontSize:15, color:"var(--text)" }}>Notifications</span>
          {allItems.some(i => !i.read) && (
            <span style={{ fontSize:11, color:"var(--teal)", fontWeight:600, background:"rgba(217,119,6,0.08)", padding:"3px 8px", borderRadius:6 }}>
              {allItems.filter(i => !i.read).length} new
            </span>
          )}
        </div>

        {/* Items */}
        {allItems.length === 0 ? (
          <div style={{ padding:"32px 16px", textAlign:"center" }}>
            <div style={{ fontSize:32, marginBottom:8 }}>🔕</div>
            <div style={{ fontSize:13, color:"var(--muted)" }}>No notifications yet</div>
            <div style={{ fontSize:11, color:"var(--muted)", marginTop:4 }}>New posts, reactions & replies will appear here</div>
          </div>
        ) : (
          allItems.map(item => (
            <div key={item.id} className={`notif-row ${!item.read ? "unread" : ""}`} onClick={item.onClick}>
              <div style={{ width:32, height:32, borderRadius:9, background:"rgba(217,119,6,0.09)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>
                {item.icon}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:12, fontWeight:700, color:"var(--teal)", marginBottom:2 }}>{item.title}</div>
                <div style={{ fontSize:12, color:"var(--text)", lineHeight:1.45, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>
                  {item.body}
                </div>
                <div style={{ fontSize:10, color:"var(--muted)", marginTop:3 }}>{timeAgo(item.ts)}</div>
              </div>
              {!item.read && (
                <div style={{ width:7, height:7, borderRadius:"50%", background:"var(--teal)", flexShrink:0, marginTop:4 }} />
              )}
            </div>
          ))
        )}

        {/* Footer — Safari iOS note */}
        {isIOSDevice() && (
          <div style={{ padding:"10px 14px", borderTop:"1px solid var(--border)", fontSize:11, color:"var(--muted)", textAlign:"center" }}>
            📱 Add to Home Screen for push notifications on iOS
          </div>
        )}
      </div>
    );
  }

  /* ═══════════════════════════════════
     RENDER
     ═══════════════════════════════════ */
  const container = document.getElementById("root");
  const root = ReactDOM.createRoot(container);
  root.render(<App />);
</script>
</body>
</html>
