  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #fffbf0;
      --bg2:    #fff8e6;
      --accent: #d97706;
      --gold:   #f59e0b;
      --deep:   #92400e;
      --text:   #1c1006;
      --muted:  #a07840;
      --card:   #ffffff;
      --border: rgba(217,119,6,0.18);
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 44px;
      overflow-x: hidden;
      position: relative;
    }

    h1,h2,h3 { font-family:'Syne',sans-serif; }

    /* ── Background pattern dots ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(217,119,6,0.12) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
    }

    /* ── Soft amber blobs ── */
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0;
    }
    .blob-1 { width:420px; height:420px; background:#fbbf24; opacity:.18; top:-120px;   left:-100px;  }
    .blob-2 { width:320px; height:320px; background:#f59e0b; opacity:.14; bottom:-80px; right:-60px;  }
    .blob-3 { width:200px; height:200px; background:#fde68a; opacity:.22; top:50%;      left:60%;     }

    /* ── Card ── */
    .card {
      position: relative; z-index: 10;
      max-width: 530px; width: 100%;
      background: var(--card);
      border: 1.5px solid rgba(217,119,6,0.16);
      border-radius: 28px;
      box-shadow:
        0 2px 0 rgba(217,119,6,0.08),
        0 8px 32px rgba(217,119,6,0.08),
        0 32px 80px rgba(0,0,0,0.06);
      padding: 48px 40px 42px;
      text-align: center;
      animation: rise .85s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise {
      from { opacity:0; transform:translateY(24px) scale(.97); }
      to   { opacity:1; transform:none; }
    }
    /* top gold bar */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 80px; height: 3px; border-radius: 0 0 4px 4px;
      background: linear-gradient(90deg, var(--gold), var(--accent));
    }

    /* ── Logo ── */
    .logo-wrap { display:inline-flex; align-items:center; gap:11px; margin-bottom:34px; }
    .logo-svg  { width:46px; height:46px; }
    .logo-name { font-family:'Syne',sans-serif; font-weight:900; font-size:22px;
                 letter-spacing:.08em; color:var(--text); text-align:left; line-height:1; }
    .logo-sub  { font-size:10px; color:var(--muted); letter-spacing:.15em;
                 text-transform:uppercase; margin-top:3px; text-align:left; }

    /* ── Robot ── */
    .robot-wrap { width:170px; height:190px; margin:0 auto 34px; }
    .robot-svg {
      width:100%; height:100%;
      animation: float 4.5s ease-in-out infinite;
      filter: drop-shadow(0 12px 24px rgba(217,119,6,0.18));
    }
    @keyframes float {
      0%,100% { transform:translateY(0)     rotate(-.8deg); }
      50%      { transform:translateY(-11px) rotate(.8deg);  }
    }
    .eye-l,.eye-r { animation:blink 5s ease-in-out infinite; }
    @keyframes blink { 0%,88%,100%{transform:scaleY(1);} 93%{transform:scaleY(.08);} }
    .arm-l { animation:wave 3.2s ease-in-out infinite;         transform-origin:56px 112px; }
    .arm-r { animation:wave 3.2s ease-in-out infinite reverse; transform-origin:114px 112px; }
    @keyframes wave { 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(13deg);} }
    .spin-cw  { animation:spin 9s linear infinite;         transform-origin:center; }
    .spin-ccw { animation:spin 7s linear infinite reverse; transform-origin:center; }
    @keyframes spin { to{transform:rotate(360deg);} }
    .ant-dot { animation:antP 1.6s ease-in-out infinite; }
    @keyframes antP { 0%,100%{opacity:.5;} 50%{opacity:1;} }

    /* ── Badge ── */
    .badge {
      display:inline-flex; align-items:center; gap:7px;
      font-size:11px; font-weight:700; letter-spacing:.13em; text-transform:uppercase;
      color: var(--accent);
      background: rgba(217,119,6,0.08);
      border: 1.5px solid rgba(217,119,6,0.22);
      padding:5px 14px; border-radius:999px; margin-bottom:18px;
    }
    .bdot { width:6px; height:6px; border-radius:50%; background:var(--accent);
            animation:bdotP 1.6s ease-in-out infinite; }
    @keyframes bdotP {
      0%,100%{ box-shadow:0 0 0 0 rgba(217,119,6,.5); }
      50%    { box-shadow:0 0 0 5px transparent;       }
    }

    /* ── Heading ── */
    .heading {
      font-family:'Syne',sans-serif; font-weight:900;
      font-size:clamp(28px,5.5vw,42px);
      line-height:1.12; letter-spacing:-.015em;
      color: var(--text); margin-bottom:14px;
    }
    .heading em {
      font-style:normal;
      background:linear-gradient(130deg, var(--accent), var(--gold));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    .sub {
      font-size:14.5px; color:var(--muted); line-height:1.7;
      max-width:350px; margin:0 auto 32px;
    }

    /* ── Divider ── */
    .divider {
      width:52px; height:1.5px;
      background:linear-gradient(90deg,transparent,rgba(217,119,6,.4),transparent);
      margin:0 auto 28px;
    }

    /* ── Chips ── */
    .chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:30px; }
    .chip  {
      display:inline-flex; align-items:center; gap:7px;
      padding:7px 15px;
      background: rgba(217,119,6,0.05);
      border: 1.5px solid rgba(217,119,6,0.14);
      border-radius:999px;
      font-size:12px; font-weight:600; color:var(--muted);
    }
    .chip .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .dot-a { background:var(--accent); animation:dp 2s ease-in-out infinite; }
    .dot-g { background:#16a34a;       animation:dp 2s ease-in-out infinite .4s; }
    .dot-y { background:var(--gold);   animation:dp 2s ease-in-out infinite .8s; }
    @keyframes dp {
      0%,100%{ box-shadow:0 0 0 0 currentcolor; }
      60%    { box-shadow:0 0 0 5px transparent; }
    }

    /* ── Icon buttons ── */
    .icon-row { display:flex; gap:10px; justify-content:center; }
    .ibtn {
      width:44px; height:44px; border-radius:12px;
      border: 1.5px solid rgba(217,119,6,0.16);
      background: rgba(217,119,6,0.04);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:var(--muted);
      transition:all .2s ease;
    }
    .ibtn:hover {
      background: rgba(217,119,6,0.12);
      border-color: rgba(217,119,6,0.4);
      color: var(--accent);
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(217,119,6,0.14);
    }
    .ibtn svg { width:19px; height:19px; fill:currentColor; }

    /* ── Footer ── */
    .footer {
      position:relative; z-index:10; margin-top:24px;
      font-size:11.5px; color:rgba(160,120,64,0.5); letter-spacing:.04em;
    }
    .footer b { color:rgba(160,120,64,0.75); }

    @media (max-width:460px) {
      .card { padding:32px 18px 28px; border-radius:22px; }
    }
  </style>
</head>
